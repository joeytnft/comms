name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Mobile app checks
  mobile:
    name: Mobile App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm test -- --ci --coverage

  # Server checks
  server:
    name: Server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: guardian
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gathersafe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U guardian"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://guardian:password@localhost:5432/gathersafe_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-1234567890
      JWT_REFRESH_SECRET: test-refresh-secret-1234567890
      LIVEKIT_API_KEY: testkey
      LIVEKIT_API_SECRET: testsecret
      LIVEKIT_URL: http://localhost:7880
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test -- --ci --coverage
